name: "Docs"
run-name: "Docs for ${{ github.ref_name }}"

concurrency:
    group: "docs-${{ github.ref }}"
    cancel-in-progress: true

on:
    push:
        branches: ["main"]
        paths:
            - ".docs/**"
            - ".github/workflows/docs.yml"
            - "src/**"
            - "typedoc.json"
            - "package.json"
            - "README.md"
    workflow_dispatch:

permissions:
    contents: "write"

defaults:
    run:
        shell: "bash"

jobs:
    build-deploy:
        name: "Build and deploy docs"
        runs-on: "ubuntu-latest"
        timeout-minutes: 15
        steps:
            - name: "Harden the runner (Audit all outbound calls)"
              uses: "step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411" # v2.19.4
              with:
                  egress-policy: "audit"

            - name: "Checkout"
              uses: "actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0" # v7.0.0
              with:
                  fetch-depth: 0

            - name: "Setup Node"
              uses: "actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e" # v6.4.0
              with:
                  node-version-file: ".node-version"
                  package-manager-cache: false

            - name: "Upgrade npm"
              working-directory: "${{ runner.temp }}"
              run: "npm install --global npm@11.14.1"

            - name: "Install dependencies"
              run: "npm ci"

            - name: "Build docs (Markdown)"
              run: "npm run docs"

            - name: "Prepare landing & theme"
              run: |
                  cp .docs/index.md docs/index.md
                  cp .docs/_config.yml docs/_config.yml
                  mkdir -p docs/_includes
                  cp .docs/_includes/head-custom.html docs/_includes/head-custom.html
                  if [ -f docs/README.md ]; then echo "Preserving generated README.md"; fi
                  # Ensure media folder referenced by logo exists
                  mkdir -p docs/_media
                  # Jekyll processing (no .nojekyll)
                  echo "Custom landing and Jekyll config applied"

            - name: "Deploy to gh-pages"
              uses: "peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453" # v4.1.0
              with:
                  github_token: "${{ secrets.GITHUB_TOKEN }}"
                  publish_dir: "./docs"
                  publish_branch: "gh-pages"
                  enable_jekyll: true
